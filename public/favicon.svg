<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo y borde circular exterior -->
  <circle cx="100" cy="100" r="92" stroke="#2C5E43" stroke-width="6" fill="#FDFDFB" />
  
  <!-- Círculo de línea fina interior -->
  <circle cx="100" cy="100" r="82" stroke="#2C5E43" stroke-width="2" />
  
  <!-- Rutas de referencia para las curvas del texto circular -->
  <path id="curveTop" d="M 30 100 A 70 70 0 0 1 170 100" fill="none" stroke="none" />
  <path id="curveBottom" d="M 30 105 A 70 70 0 0 0 170 105" fill="none" stroke="none" />
  
  <!-- Texto MODO (Arriba) -->
  <text font-family="system-ui, -apple-system, sans-serif" font-weight="900" fill="#1E2521" font-size="22px" letter-spacing="4">
    <textPath href="#curveTop" startOffset="50%" textAnchor="middle">MODO</textPath>
  </text>

  <!-- Texto MATE (Abajo) -->
  <text font-family="system-ui, -apple-system, sans-serif" font-weight="900" fill="#1E2521" font-size="22px" letter-spacing="4">
    <textPath href="#curveBottom" startOffset="50%" textAnchor="middle">MATE</textPath>
  </text>
  
  <!-- Dibujo del mate en el centro -->
  <path d="M 72 103 C 70 135, 130 135, 128 103 C 128 92, 72 92, 72 103 Z" fill="#FDFDFB" stroke="#1E2521" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Boca del mate -->
  <ellipse cx="100" cy="95" rx="23" ry="6" fill="#FDFDFB" stroke="#1E2521" stroke-width="5" />
  
  <!-- Bombilla -->
  <path d="M 105 91 L 126 64" fill="none" stroke="#1E2521" stroke-width="6" stroke-linecap="round" />
  <path d="M 126 64 C 126 64, 132 60, 137 60" fill="none" stroke="#1E2521" stroke-width="6" stroke-linecap="round" />
  <path d="M 122 69 L 127 65" fill="none" stroke="#1E2521" stroke-width="4" />
</svg>